# Nexus — Vite / TanStack Start + Capacitor (not React Native / Flutter)
# Docs: https://docs.codemagic.io/yaml-quick-start/building-an-ionic-app/

workflows:
  web-smoke:
    name: Web smoke
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
      # Optional live probe: set HEALTH_CHECK_URL (or CAPACITOR_SERVER_URL / SITE_URL)
      # in workflow vars; OPS_HEALTH_REQUIRE=1 to fail when missing.
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Unit tests
        script: npm test
      - name: Scoped typecheck
        script: npm run typecheck
      - name: Full typecheck
        script: npm run typecheck:full
      - name: Security smoke
        script: npm run smoke:security
      - name: Lint (non-prettier)
        script: npm run lint:ci
      - name: Launch / App Store packaging smoke
        script: npm run smoke:launch
      - name: Build web app
        script: npm run build
      - name: Capacitor packaging smoke
        script: npm run cap:smoke
      - name: Deployed health probe
        script: npm run ops:health
    artifacts:
      - .output/public/**

  ios-capacitor:
    name: Capacitor iOS IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    # Must match the API key name in Codemagic → Integrations / Developer Portal
    # (yours was named "test" when fetching profiles). Change if you rename it.
    integrations:
      app_store_connect: test
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lilnetro0.nexus
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      # Env group must contain CAPACITOR_SERVER_URL=https://your-live-site
      groups:
        - test
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
      - name: Prepare Capacitor www and sync iOS
        script: |
          if [ -z "$CAPACITOR_SERVER_URL" ]; then
            echo "ERROR: CAPACITOR_SERVER_URL is not set in Codemagic Environment variables."
            echo "Add Variable name=CAPACITOR_SERVER_URL value=https://your-live-site (no trailing slash)"
            exit 1
          fi
          echo "CAPACITOR_SERVER_URL=$CAPACITOR_SERVER_URL"
          export CAPACITOR_REQUIRE_SERVER=1
          npm run cap:prepare
          npx cap sync ios
          npm run cap:inject-server
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # Scaffold workflow — enable after `npx cap add android` creates android/.
  android-capacitor:
    name: Capacitor Android (scaffold)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 17
      groups:
        - test
    scripts:
      - name: Require android/ tree
        script: |
          if [ ! -d "$CM_BUILD_DIR/android" ]; then
            echo "android/ missing — run locally: npx cap add android && commit"
            echo "See docs/CAPACITOR.md § Android"
            exit 1
          fi
      - name: Install dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
      - name: Prepare Capacitor + sync Android
        script: |
          if [ -z "$CAPACITOR_SERVER_URL" ]; then
            echo "ERROR: CAPACITOR_SERVER_URL required (HTTPS, no trailing slash)"
            exit 1
          fi
          export CAPACITOR_REQUIRE_SERVER=1
          npm run cap:prepare
          npx cap sync android
      - name: Assemble release APK (unsigned scaffold)
        script: |
          cd "$CM_BUILD_DIR/android"
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
