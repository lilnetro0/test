# Nexus — Vite / TanStack Start + Capacitor (not React Native / Flutter)
# Docs: https://docs.codemagic.io/yaml-quick-start/building-an-ionic-app/

workflows:
  web-smoke:
    name: Web smoke
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
    artifacts:
      - .output/public/**

  ios-capacitor:
    name: Capacitor iOS IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lilnetro0.nexus
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        # Optional: set CAPACITOR_SERVER_URL in Codemagic → Environment variables
        # to your deployed HTTPS site (required for a usable in-app experience).
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
      - name: Prepare Capacitor www and sync iOS
        script: |
          npm run cap:prepare
          npx cap sync ios
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    # Enable after Apple Developer + App Store Connect API key are linked in Codemagic:
    # publishing:
    #   app_store_connect:
    #     auth: integration
    #     submit_to_testflight: true
