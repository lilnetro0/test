# Nexus — Vite / TanStack Start + Capacitor (not React Native / Flutter)
# Docs: https://docs.codemagic.io/yaml-quick-start/building-an-ionic-app/

workflows:
  web-smoke:
    name: Web smoke
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
    artifacts:
      - .output/public/**

  ios-capacitor:
    name: Capacitor iOS IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    # Must match the API key name in Codemagic → Integrations / Developer Portal
    # (yours was named "test" when fetching profiles). Change if you rename it.
    integrations:
      app_store_connect: test
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lilnetro0.nexus
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        # REQUIRED — set in Codemagic UI as an Application or Workflow env var:
        # CAPACITOR_SERVER_URL=https://your-worker.workers.dev
      groups:
        # Optional: put CAPACITOR_SERVER_URL in a group named "mobile_env"
        # and uncomment the next line. Otherwise set it as an Application variable.
        # - mobile_env
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
      - name: Prepare Capacitor www and sync iOS
        script: |
          if [ -z "$CAPACITOR_SERVER_URL" ]; then
            echo "ERROR: CAPACITOR_SERVER_URL is not set in Codemagic Environment variables."
            echo "Add Variable name=CAPACITOR_SERVER_URL value=https://your-live-site (no trailing slash)"
            exit 1
          fi
          echo "CAPACITOR_SERVER_URL=$CAPACITOR_SERVER_URL"
          npm run cap:prepare
          npx cap sync ios
          npm run cap:inject-server
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
